version: '3.8'

services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/resources.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ODER Fullstack (alles in einem Container)
  fullstack:
    build:
      context: .
      target: fullstack
    ports:
      - "8080:80"
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/resources.db
    restart: unless-stopped
    profiles:
      - fullstack
